<!DOCTYPE html>
<html lang="mn" translate="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f4c81" />
  <meta name="google" content="notranslate" />
  <title>Барилгын Нягтлан · Construction Accountant</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="auth.css" />
  <script>
    // Apply saved theme before paint to avoid a flash.
    try {
      var t = localStorage.getItem('ca_theme') ||
        ((window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
    } catch (e) {}
  </script>
</head>
<body>
  <!-- ===== Intro splash ===== -->
  <div id="introScreen">
    <div class="intro-logo">🏗️</div>
    <div class="intro-title">Барилгын Нягтлан</div>
    <div class="intro-sub">Construction Accountant</div>
    <div class="intro-bar"></div>
  </div>

  <!-- ===== Auth screen ===== -->
  <div id="authView" class="auth-overlay hidden">
    <div class="auth-card">
      <div class="auth-logo">🏗️</div>
      <h2>Барилгын Нягтлан</h2>
      <p class="auth-sub">Construction Accountant · үүлэн бүртгэл</p>
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login" id="tabLogin">Нэвтрэх / Login</button>
        <button class="auth-tab" data-tab="register" id="tabRegister">Бүртгүүлэх / Register</button>
      </div>
      <div id="regNameField" class="field hidden">
        <label data-t="name"></label>
        <input id="authName" autocomplete="off" />
      </div>
      <div class="field">
        <label>Имэйл / Email</label>
        <input id="authEmail" type="email" autocomplete="off" />
      </div>
      <div class="field">
        <label>Нууц үг / Password</label>
        <input id="authPass" type="password" autocomplete="off" />
      </div>
      <div class="auth-err" id="authErr"></div>
      <button class="btn primary" id="authSubmit">Нэвтрэх / Login</button>
      <p class="auth-hint">Өгөгдөл үүлэнд хадгалагдаж, утас/компьютер хооронд синк болно.<br>Data is stored in the cloud and syncs across devices.</p>
    </div>
  </div>

  <!-- ===== App shell ===== -->
  <div id="appShell" class="hidden">
    <header class="topbar">
      <button id="menuBtn" class="icon-btn" aria-label="Menu">☰</button>
      <div class="brand"><span class="logo">🏗️</span><span class="brand-text" id="brandName">Барилгын Нягтлан</span></div>
      <div class="topbar-right">
        <button id="themeBtn" class="icon-btn" title="Theme / Загвар">🌙</button>
        <button id="langBtn" class="chip" title="Хэл / Language">МН/EN</button>
        <div class="acct"><span id="cloudDot" class="cloud-dot ok" title="Cloud">●</span><span class="avatar" id="avatar">?</span></div>
      </div>
    </header>
    <div class="layout">
      <nav id="sidebar" class="sidebar">
        <a class="navlink" data-route="dashboard"><span class="ni">📊</span><span class="nt" data-t="nav_dashboard"></span></a>
        <a class="navlink" data-route="materials"><span class="ni">📦</span><span class="nt" data-t="nav_materials"></span></a>
        <a class="navlink" data-route="stocktake"><span class="ni">📋</span><span class="nt" data-t="nav_stocktake"></span></a>
        <a class="navlink" data-route="ledger"><span class="ni">💰</span><span class="nt" data-t="nav_ledger"></span></a>
        <a class="navlink" data-route="loans"><span class="ni">🏦</span><span class="nt" data-t="nav_loans"></span></a>
        <a class="navlink" data-route="convert"><span class="ni">🔄</span><span class="nt" data-t="nav_convert"></span></a>
        <a class="navlink" data-route="settings"><span class="ni">⚙️</span><span class="nt" data-t="nav_settings"></span></a>
      </nav>
      <div id="scrim" class="scrim"></div>
      <main id="app" class="content"></main>
    </div>
  </div>

  <!-- Reusable modal -->
  <div id="modal" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-head"><h3 id="modalTitle"></h3><button id="modalClose" class="icon-btn" aria-label="Close">✕</button></div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
